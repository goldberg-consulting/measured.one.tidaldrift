name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install pre-commit and SwiftLint
        run: brew install pre-commit swiftlint

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

  homebrew-cask:
    name: Homebrew Cask
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Style cask
        run: brew style Casks/tidaldrift.rb

      - name: Verify cask asset checksum
        run: |
          VERSION=$(ruby -ne 'puts $1 if /^\s*version "([^"]+)"/' Casks/tidaldrift.rb)
          SHA=$(ruby -ne 'puts $1 if /^\s*sha256 "([^"]+)"/' Casks/tidaldrift.rb)
          URL="https://github.com/goldberg-consulting/measured.one.tidaldrift/releases/download/v${VERSION}/TidalDrift-${VERSION}.dmg"
          curl --fail --location --output /tmp/TidalDrift.dmg "$URL"
          echo "${SHA}  /tmp/TidalDrift.dmg" | shasum -a 256 --check

      - name: Dry-run cask install
        run: |
          brew tap-new local/tidaldrift
          mkdir -p "$(brew --repository)/Library/Taps/local/homebrew-tidaldrift/Casks"
          cp Casks/tidaldrift.rb "$(brew --repository)/Library/Taps/local/homebrew-tidaldrift/Casks/tidaldrift.rb"
          brew install --cask --dry-run local/tidaldrift/tidaldrift
          brew untap --force local/tidaldrift

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: TidalDrift
        run: swiftlint lint --reporter github-actions-logging

  spm:
    name: SwiftPM Build and Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Build with Swift Package Manager
        working-directory: TidalDrift
        run: swift build

      - name: Test with Swift Package Manager
        working-directory: TidalDrift
        run: swift test

  xcodebuild:
    name: Xcode Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Build app scheme with xcodebuild
        working-directory: TidalDrift
        run: |
          xcodebuild \
            -scheme TidalDrift \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
