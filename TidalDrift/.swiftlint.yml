# SwiftLint configuration for TidalDrift
# Thresholds are set to pass on the existing codebase while catching
# regressions in new code. Tighten over time as violations are cleaned up.

included:
  - App
  - Views
  - ViewModels
  - Services
  - Models
  - Utilities
  - LocalCast
  - Extensions

excluded:
  - .build
  - build-xcode
  - dist
  - Scripts
  - PressKit
  - Resources

# Rules that produce too much noise on the existing codebase.
# Re-enable as the code is cleaned up.
disabled_rules:
  - trailing_whitespace
  - trailing_newline
  - multiple_closures_with_trailing_closure
  - todo

opt_in_rules:
  - closure_spacing
  - empty_string
  - fatal_error_message
  - first_where
  - implicit_return
  - modifier_order
  - overridden_super_call
  - private_over_fileprivate
  - redundant_nil_coalescing
  - sorted_first_last
  - unowned_variable_capture
  - vertical_parameter_alignment_on_call

line_length:
  warning: 160
  error: 300
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

file_length:
  warning: 600
  error: 2000

type_body_length:
  warning: 400
  error: 1200

function_body_length:
  warning: 60
  error: 150

cyclomatic_complexity:
  warning: 15
  error: 30

identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 60
    error: 80
  allowed_symbols:
    - _
  excluded:
    - i
    - j
    - k
    - x
    - y
    - id
    - ip
    - ok
    - to
    - n

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60

large_tuple:
  warning: 4
  error: 6

force_cast:
  severity: warning

function_parameter_count:
  warning: 6
  error: 10

nesting:
  type_level:
    warning: 2
    error: 4
  function_level:
    warning: 3
    error: 5
